<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProStat-Kontura V1.1</title>
    <style>
        :root {
            --bg: #f3f4f6; --header: #1e293b; --accent: #2563eb; --text: #1f2937;
            --white: #ffffff; --border: #d1d5db; --win: #16a34a; --loss: #dc2626;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* Navigacijski stilovi */
        header { height: 10vh; background: var(--header); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 3px solid var(--accent); }
        main { display: flex; height: 82vh; }
        footer { height: 8vh; background: var(--header); display: flex; justify-content: space-around; align-items: center; }

        .sidebar { width: 280px; background: #e5e7eb; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px; }
        .workspace { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

        /* Dugmad */
        .btn { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; width: 100%; margin-bottom: 5px; }
        .btn-sel { background: var(--accent) !important; color: white !important; border-color: white !important; }
        .btn-action { height: 70px; border-width: 2px; font-weight: 900; }
        
        .grid-main { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-def { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }

        /* IHF Tabelarni stilovi */
        .ihf-table { width: 100%; border-collapse: collapse; font-size: 11px; background: white; margin-bottom: 20px; }
        .ihf-table th, .ihf-table td { border: 1px solid #999; padding: 4px; text-align: center; }
        .ihf-table th { background: #eee; font-weight: bold; }
        .team-title { background: var(--header); color: white; padding: 8px; font-weight: 900; text-transform: uppercase; margin-top: 20px; }

        /* Modalni prozori */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; color: black; }

        .action-input { width: 100%; padding: 15px; font-size: 20px; font-weight: bold; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 15px; text-align: center; }

        #report-view { display: none; position: fixed; inset: 0; background: white; z-index: 2000; overflow-y: auto; padding: 30px; color: black; }
        
        @media print { .no-print { display: none !important; } #report-view { display: block !important; position: static; } }
    </style>
</head>
<body>

    <div id="live-ui">
        <header>
            <div style="font-weight: 900; font-style: italic; font-size: 22px;">ProStat-Kontura <span style="color: #60a5fa;">V1</span></div>
            <div id="score-display" style="font-size: 40px; font-weight: 900;">0 : 0</div>
            <div style="text-align: right;">
                <div id="timer-display" style="font-family: monospace; font-size: 22px;">00:00</div>
                <button onclick="toggleTimer()" id="timer-btn" style="background: none; border: 1px solid white; color: white; border-radius: 4px; font-size: 10px; padding: 2px 8px;">START</button>
            </div>
        </header>

        <main>
            <div class="sidebar">
                <div id="home-list"></div>
                <div style="height: 2px; background: #999; margin: 15px 0;"></div>
                <div id="away-list"></div>
            </div>
            
            <div class="workspace">
                <!-- IZBOR ODBRANE -->
                <p style="font-size: 10px; font-weight: bold; margin: 0 0 5px 0; color: #666;">ODBRANA KOJA SE IGRA:</p>
                <div class="grid-def">
                    <button class="btn" id="def-6-0" onclick="setDefense('6-0')">6-0</button>
                    <button class="btn" id="def-5-1" onclick="setDefense('5-1')">5-1</button>
                    <button class="btn" id="def-4-2" onclick="setDefense('4-2')">4-2</button>
                    <button class="btn" id="def-3-3" onclick="setDefense('3-3')">3-3</button>
                    <button class="btn" id="def-FL" onclick="setDefense('FL')">FL</button>
                </div>

                <!-- GLAVNE AKCIJE -->
                <div class="grid-main">
                    <button class="btn btn-action" style="border-color: #16a34a; color: #16a34a;" onclick="openShot('GOL')">GOL</button>
                    <button class="btn btn-action" style="border-color: #2563eb; color: #2563eb;" onclick="openShot('OBRANA')">OBRANA</button>
                    <button class="btn btn-action" style="border-color: #4b5563; color: #4b5563;" onclick="openShot('PROMAŠAJ')">PROMAŠAJ</button>
                </div>

                <!-- POMOĆNE AKCIJE -->
                <div class="grid-main" style="grid-template-columns: repeat(4, 1fr);">
                    <button class="btn" style="height: 50px;" onclick="quickLog('asist')">Asist</button>
                    <button class="btn" style="height: 50px;" onclick="quickLog('tf')">Tehn. G.</button>
                    <button class="btn" style="height: 50px;" onclick="quickLog('ukr')">Ukrada</button>
                    <button class="btn" style="height: 50px;" onclick="quickLog('blok')">Blok</button>
                    <button class="btn" style="height: 50px; border-color: #ea580c; color: #ea580c;" onclick="quickLog('2min')">2 Min</button>
                    <button class="btn" style="height: 50px; border-color: #991b1b; color: #991b1b;" onclick="quickLog('crveni')">Crveni</button>
                </div>

                <div id="log-feed" style="background: white; border: 1px solid var(--border); flex: 1; padding: 10px; border-radius: 8px; overflow-y: auto; font-size: 12px; font-style: italic; color: #666;">
                    Odaberite igrača na listi lijevo...
                </div>
            </div>
        </main>

        <footer>
            <button class="btn" style="width: 200px; background: #334155; color: white;" onclick="switchTab('live')">Uživo</button>
            <button class="btn" style="width: 200px; background: var(--accent); color: white;" onclick="switchTab('report')">Zapisnik</button>
        </footer>
    </div>

    <!-- REPORT VIEW -->
    <div id="report-view"></div>

    <!-- SHOT MODAL -->
    <div class="modal" id="shot-modal">
        <div class="modal-content">
            <h2 id="shot-title" style="margin: 0 0 15px 0; text-transform: uppercase; font-weight: 900;">UNOS ŠUTA</h2>
            
            <label style="font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px;">BROJ AKCIJE:</label>
            <input type="number" id="shot-action-nr" class="action-input" placeholder="00">

            <label style="font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px;">POZICIJA ŠUTA:</label>
            <div class="grid-def" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 20px;">
                <button class="btn" id="z-9m" onclick="setZ('9m')">9m</button>
                <button class="btn" id="z-6m" onclick="setZ('6m')">6m</button>
                <button class="btn" id="z-wing" onclick="setZ('krilo')">Krilo</button>
                <button class="btn" id="z-fb" onclick="setZ('kontra')">Kontra</button>
                <button class="btn" id="z-brk" onclick="setZ('prodor')">Prodor</button>
                <button class="btn" id="z-7m" onclick="setZ('7m')">7m</button>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-sel" onclick="confirmShot()">POTVRDI I SPREMI</button>
                <button class="btn" onclick="closeShot()">PONIŠTI</button>
            </div>
        </div>
    </div>

    <script>
        // --- STANJE APLIKACIJE ---
        let game = {
            t: 0, run: false, score: [0,0], sel: null, activeDefense: '6-0',
            players: {
                home: [
                    { id: 'h1', n: 'Golman D1', nr: '1', gk: true, s: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, sv: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, as:0, tf:0, st:0, bl:0, m2:0, goals_actions: [] },
                    { id: 'h2', n: 'Igrač D2', nr: '7', gk: false, s: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, g: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, as:0, tf:0, st:0, bl:0, m2:0, goals_actions: [] },
                    { id: 'h3', n: 'Igrač D3', nr: '10', gk: false, s: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, g: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, as:0, tf:0, st:0, bl:0, m2:0, goals_actions: [] }
                ],
                away: [
                    { id: 'a1', n: 'Golman G1', nr: '12', gk: true, s: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, sv: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, as:0, tf:0, st:0, bl:0, m2:0, goals_actions: [] },
                    { id: 'a2', n: 'Igrač G2', nr: '5', gk: false, s: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, g: { t:0, m9:0, m6:0, w:0, p7:0, fb:0, br:0 }, as:0, tf:0, st:0, bl:0, m2:0, goals_actions: [] }
                ]
            },
            history: [],
            pending: { type: '', zone: '9m' }
        };

        // --- RENDER ROSTERA ---
        function renderRoster() {
            ['home', 'away'].forEach(team => {
                const el = document.getElementById(team + '-list');
                el.innerHTML = `<p style="font-size:10px; font-weight:900; margin-bottom:5px; color:${team==='home'?'#2563eb':'#dc2626'}">${team.toUpperCase()}</p>`;
                game.players[team].forEach(p => {
                    const b = document.createElement('button');
                    b.className = `btn ${game.sel === p.id ? 'btn-sel' : ''}`;
                    b.innerText = `${p.nr}. ${p.n}`;
                    b.onclick = () => { game.sel = p.id; renderRoster(); };
                    el.appendChild(b);
                });
            });
        }

        // --- ODBRANA ---
        function setDefense(def) {
            game.activeDefense = def;
            const defs = ['6-0', '5-1', '4-2', '3-3', 'FL'];
            defs.forEach(id => {
                const b = document.getElementById('def-' + id);
                if(b) b.classList.toggle('btn-sel', id === def);
            });
        }

        // --- AKCIJE ---
        function quickLog(act) {
            const p = findP(game.sel); if(!p) return;
            if(act === 'asist') p.as++; if(act === 'tf') p.tf++; if(act === 'ukr') p.st++; if(act === 'blok') p.bl++; if(act === '2min') p.m2++;
            addHistory(`${p.n}: ${act.toUpperCase()}`); game.sel = null; renderRoster();
        }

        function openShot(type) {
            if(!game.sel) return;
            game.pending = { type: type, zone: '9m' };
            document.getElementById('shot-title').innerText = type;
            document.getElementById('shot-action-nr').value = "";
            document.getElementById('shot-modal').classList.add('active');
            setZ('9m');
        }

        function setZ(z) {
            game.pending.zone = z;
            const zones = ['9m','6m','wing','fb','brk','7m'];
            zones.forEach(id => {
                const b = document.getElementById('z-'+id);
                if(b) b.classList.toggle('btn-sel', id === z || (id==='wing' && z==='krilo') || (id==='fb' && z==='kontra') || (id==='brk' && z==='prodor'));
            });
        }

        function confirmShot() {
            const p = findP(game.sel);
            const teamIdx = game.players.home.includes(p) ? 0 : 1;
            const oppGK = game.players[teamIdx === 0 ? 'away' : 'home'].find(x => x.gk);
            const z = game.pending.zone;
            const type = game.pending.type;
            const actionNr = document.getElementById('shot-action-nr').value;

            const mapZone = (z) => {
                if(z==='9m') return 'm9'; if(z==='6m') return 'm6'; if(z==='krilo') return 'w';
                if(z==='7m') return 'p7'; if(z==='kontra') return 'fb'; if(z==='prodor') return 'br';
                return 'm9';
            };
            const zoneKey = mapZone(z);

            p.s.t++; p.s[zoneKey]++;
            if(type === 'GOL') {
                p.g.t++; p.g[zoneKey]++; game.score[teamIdx]++;
                if(actionNr) p.goals_actions.push(actionNr);
                if(oppGK) { oppGK.s.t++; oppGK.s[zoneKey]++; }
            } else if(type === 'OBRANA') {
                if(oppGK) { oppGK.s.t++; oppGK.s[zoneKey]++; oppGK.sv.t++; oppGK.sv[zoneKey]++; }
            } else { 
                if(oppGK) { oppGK.s.t++; oppGK.s[zoneKey]++; }
            }

            addHistory(`${p.n}: ${type} (${z}) ${actionNr ? `[A:${actionNr}]` : ''} - Odbrana: ${game.activeDefense}`);
            closeShot(); game.sel = null; renderRoster();
            document.getElementById('score-display').innerText = `${game.score[0]} : ${game.score[1]}`;
        }

        const findP = (id) => game.players.home.find(x => x.id === id) || game.players.away.find(x => x.id === id);
        const closeShot = () => document.getElementById('shot-modal').classList.remove('active');
        const addHistory = (m) => { game.history.unshift(`[${fmtT(game.t)}] ${m}`); document.getElementById('log-feed').innerHTML = game.history.join('<br>'); };
        const fmtT = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

        function toggleTimer() { game.run = !game.run; document.getElementById('timer-btn').innerText = game.run ? 'STOP' : 'START'; }
        setInterval(() => { if(game.run) { game.t++; document.getElementById('timer-display').innerText = fmtT(game.t); } }, 1000);

        function switchTab(t) {
            const view = document.getElementById('report-view');
            if(t === 'report') { view.style.display = 'block'; renderIHFReport(); } 
            else { view.style.display = 'none'; }
        }

        // --- IHF ZAPISNIK ---
        function renderIHFReport() {
            const v = document.getElementById('report-view');
            let h = `
                <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:20px;">
                    <h1 style="margin:0; font-size:24px;">MATCH TEAM STATISTICS</h1>
                    <p style="margin:0; font-size:12px;">ProStat-Kontura V1.1 Report</p>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px; margin-bottom:20px;">
                    <span>DOMAĆI TIM</span> <span>${game.score[0]} : ${game.score[1]}</span> <span>GOSTUJUĆI TIM</span>
                </div>
                ${['home', 'away'].map(team => `
                    <div class="team-title">${team === 'home' ? 'DOMAĆI' : 'GOSTI'} TIM - IGRAČI</div>
                    <table class="ihf-table">
                        <tr>
                            <th rowspan="2">#</th><th rowspan="2" style="text-align:left;">Ime i prezime</th>
                            <th colspan="2">Ukupno</th><th colspan="6">Golovi / Šutevi</th>
                            <th rowspan="2">As.</th><th rowspan="2">TF</th><th rowspan="2">2m</th><th rowspan="2">Goli iz akcija</th>
                        </tr>
                        <tr>
                            <th>Gol</th><th>Šut</th><th>9m</th><th>6m</th><th>7m</th><th>Krilo</th><th>Kontra</th><th>Prodor</th>
                        </tr>
                        ${game.players[team].filter(p => !p.gk).map(p => `
                            <tr>
                                <td>${p.nr}</td><td style="text-align:left;">${p.n}</td>
                                <td><b>${p.g.t}</b></td><td>${p.s.t}</td>
                                <td>${p.g.m9}/${p.s.m9}</td><td>${p.g.m6}/${p.s.m6}</td><td>${p.g.p7}/${p.s.p7}</td><td>${p.g.w}/${p.s.w}</td><td>${p.g.fb}/${p.s.fb}</td><td>${p.g.br}/${p.s.br}</td>
                                <td>${p.as}</td><td>${p.tf}</td><td>${p.m2}</td>
                                <td style="font-size:9px; color:blue;">${p.goals_actions.join(', ') || '-'}</td>
                            </tr>
                        `).join('')}
                    </table>

                    <div class="team-title">${team === 'home' ? 'DOMAĆI' : 'GOSTI'} TIM - GOLMANI</div>
                    <table class="ihf-table">
                        <tr>
                            <th rowspan="2">#</th><th rowspan="2" style="text-align:left;">Ime i prezime</th>
                            <th colspan="2">Ukupno</th><th colspan="6">Odbrane / Šutevi</th>
                            <th rowspan="2">%</th>
                        </tr>
                        <tr>
                            <th>Obr</th><th>Šut</th><th>9m</th><th>6m</th><th>7m</th><th>Krilo</th><th>Kontra</th><th>Prodor</th>
                        </tr>
                        ${game.players[team].filter(p => p.gk).map(p => `
                            <tr>
                                <td>${p.nr}</td><td style="text-align:left;">${p.n}</td>
                                <td><b>${p.sv.t}</b></td><td>${p.s.t}</td>
                                <td>${p.sv.m9}/${p.s.m9}</td><td>${p.sv.m6}/${p.s.m6}</td><td>${p.sv.p7}/${p.s.p7}</td><td>${p.sv.w}/${p.s.w}</td><td>${p.sv.fb}/${p.s.fb}</td><td>${p.sv.br}/${p.s.br}</td>
                                <td>${p.s.t > 0 ? Math.round((p.sv.t / p.s.t) * 100) : 0}%</td>
                            </tr>
                        `).join('')}
                    </table>
                `).join('')}
                <div class="no-print" style="margin-top:30px; display:flex; gap:10px;">
                    <button class="btn" style="background:#000; color:white; padding:20px;" onclick="window.print()">ŠTAMPAJ PDF</button>
                    <button class="btn" style="background:#666; color:white; padding:20px;" onclick="switchTab('live')">NAZAD</button>
                </div>
            `;
            v.innerHTML = h;
        }

        window.onload = () => { renderRoster(); setDefense('6-0'); };
    </script>
</body>
</html>
